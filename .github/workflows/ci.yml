name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm run test

    - name: Verify shared box-resize owner
      run: test "$(git grep -l "maxWidthFromRightGrowth\|maxHeightFromBottomGrowth" -- 'src/**' | wc -l | tr -d ' ')" = 1

    - name: Verify gesture golden-rule (static)
      run: npm run test:gesture-golden-rule

    - name: Build
      run: npm run build

    - name: Verify CSP hashes
      run: npm run test:csp

    - name: Verify SEO invariants
      run: npm run test:seo

    - name: Check CSS bundle size
      run: npm run test:css

    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: Run Playwright e2e tests
      run: npm run test:e2e

    - name: Upload Playwright artifacts
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-artifacts
        path: |
          playwright-report/
          test-results/
        if-no-files-found: ignore
